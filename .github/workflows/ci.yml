name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: TypeScript Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build agent
        run: pnpm --filter @skywalker/agent build

      - name: Build web
        run: pnpm --filter @skywalker/web build
        env:
          NEXT_PUBLIC_AGENT_URL: http://localhost:3001

  lint:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check agent
        run: pnpm --filter @skywalker/agent exec tsc --noEmit

      - name: Type check web
        run: pnpm --filter @skywalker/web exec tsc --noEmit
